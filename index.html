<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legendary: Marvel Randomizer</title>
  <script>
    (() => {
      const defaultThemeId = 'dark';
      const supportedThemeIds = new Set(['dark', 'light']);
      const legacyThemeIdAliases = {
        midnight: 'dark',
        newsprint: 'light'
      };
      const defaultLocaleId = 'en-US';
      const supportedLocaleIds = new Set(['en-US', 'fr-FR', 'de-DE', 'ja-JP', 'ko-KR', 'es-ES']);
      const bootstrapCopy = {
        'en-US': {
          title: 'Legendary: Marvel Randomizer',
          subtitle: 'Browse sets, manage your collection, generate legal setups, and track history with browser-based persistence.'
        },
        'fr-FR': {
          title: 'Randomiseur Legendary: Marvel',
          subtitle: 'Parcourez les extensions, gerez votre collection, generez des mises en place valides et suivez votre historique avec une sauvegarde dans le navigateur.'
        },
        'de-DE': {
          title: 'Legendary: Marvel Zufallsgenerator',
          subtitle: 'Durchsuche Sets, verwalte deine Sammlung, generiere legale Aufstellungen und verfolge den Verlauf mit Speicherung im Browser.'
        },
        'ja-JP': {
          title: 'Legendary: Marvel ランダマイザー',
          subtitle: 'セットを閲覧し、コレクションを管理し、適法なセットアップを生成し、履歴をブラウザー保存で追跡します。'
        },
        'ko-KR': {
          title: 'Legendary: Marvel 랜덤라이저',
          subtitle: '세트를 둘러보고, 컬렉션을 관리하고, 합법적인 세팅을 생성하고, 브라우저 저장으로 기록을 추적합니다.'
        },
        'es-ES': {
          title: 'Aleatorizador de Legendary: Marvel',
          subtitle: 'Explora expansiones, gestiona tu colección, genera configuraciones legales y sigue el historial con persistencia en el navegador.'
        }
      };
      let themeId = defaultThemeId;
      let localeId = defaultLocaleId;

      try {
        const rawState = globalThis.localStorage?.getItem('legendary_state_v1');
        if (rawState) {
          const parsedState = JSON.parse(rawState);
          const candidateThemeId = parsedState?.preferences?.themeId;
          const candidateLocaleId = parsedState?.preferences?.localeId;
          const normalizedThemeId = typeof candidateThemeId === 'string'
            ? (legacyThemeIdAliases[candidateThemeId] || candidateThemeId)
            : null;
          if (typeof normalizedThemeId === 'string' && supportedThemeIds.has(normalizedThemeId)) {
            themeId = normalizedThemeId;
          }
          if (typeof candidateLocaleId === 'string' && supportedLocaleIds.has(candidateLocaleId)) {
            localeId = candidateLocaleId;
          }
        }
      } catch {
        themeId = defaultThemeId;
        localeId = defaultLocaleId;
      }

      document.documentElement.dataset.theme = themeId;
      document.documentElement.lang = localeId;
      document.documentElement.style.colorScheme = themeId === 'light' ? 'light' : 'dark';
      document.title = bootstrapCopy[localeId]?.title || bootstrapCopy[defaultLocaleId].title;
      globalThis.__LEGENDARY_BOOTSTRAP_COPY__ = bootstrapCopy[localeId] || bootstrapCopy[defaultLocaleId];
    })();
  </script>
  <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
  <meta name="theme-color" content="#f05a28" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Legendary" />
  <link rel="apple-touch-icon" href="%BASE_URL%icons/icon-192.png" />
  <link rel="stylesheet" href="./src/app/app-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./src/app/browser-entry.mjs"></script>
</body>
</html>
