<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legendary: Marvel Randomizer</title>
  <script>
    (() => {
      const defaultThemeId = 'midnight';
      const supportedThemeIds = new Set(['midnight', 'newsprint']);
      let themeId = defaultThemeId;

      try {
        const rawState = globalThis.localStorage?.getItem('legendary_state_v1');
        if (rawState) {
          const parsedState = JSON.parse(rawState);
          const candidateThemeId = parsedState?.preferences?.themeId;
          if (typeof candidateThemeId === 'string' && supportedThemeIds.has(candidateThemeId)) {
            themeId = candidateThemeId;
          }
        }
      } catch {
        themeId = defaultThemeId;
      }

      document.documentElement.dataset.theme = themeId;
      document.documentElement.style.colorScheme = themeId === 'newsprint' ? 'light' : 'dark';
    })();
  </script>
  <link rel="stylesheet" href="./src/app/app-shell.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-copy">
        <h1 id="app-title">Legendary: Marvel Randomizer</h1>
        <p id="app-subtitle">Browse sets, manage your collection, generate legal setups, and track history with browser-based persistence.</p>
      </div>
      <div class="header-controls">
        <div id="header-theme-controls"></div>
        <nav class="desktop-tab-nav" id="desktop-tabs" aria-label="Primary" role="tablist"></nav>
      </div>
    </div>
  </header>
  <main class="app-main">
    <section id="toast-region" aria-live="polite" aria-atomic="false"></section>
    <div class="tab-panel-shell">
      <section class="tab-panel" id="panel-browse" role="tabpanel"></section>
      <section class="tab-panel" id="panel-collection" role="tabpanel" hidden></section>
      <section class="tab-panel" id="panel-new-game" role="tabpanel" hidden></section>
      <section class="tab-panel" id="panel-history" role="tabpanel" hidden></section>
    </div>
    <section class="stack gap-md" id="diagnostics-shell"></section>
  </main>

  <nav class="mobile-tab-nav" id="mobile-tabs" aria-label="Primary mobile" role="tablist"></nav>
  <div id="modal-root"></div>

  <script type="module" src="./src/app/browser-entry.mjs"></script>
</body>
</html>
