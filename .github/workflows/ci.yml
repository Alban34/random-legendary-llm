name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint, Unit tests & E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:qc

  security-audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  code-analysis:
    name: SonarCloud analysis
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history required for accurate blame and new-code detection
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Generate unit test coverage (LCOV)
        run: npm run test:coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  bundle-size:
    name: Bundle size check
    runs-on: ubuntu-latest
    # Only run on pull requests
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Report bundle size
        run: du -sh dist/ >> $GITHUB_STEP_SUMMARY

      - name: Enforce 2 MB limit
        run: |
          SIZE_KB=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 2048 ]; then
            echo "❌ Bundle exceeds 2 MB limit (${SIZE_KB} KB)"
            exit 1
          fi
          echo "✓ Bundle size OK (${SIZE_KB} KB)"
